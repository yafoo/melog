<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>{{title}}</title>
    <meta name="description" content="{{description}}"/>
    <meta name="keywords" content="{{keywords}}"/>
    <link rel="stylesheet" href="/static/melog.css">
    <style>
        .content {
            width: 600px;
            max-width: 100%;
            margin: auto;
        }
        .form-item {
            display: flex;
            align-items: center;
            height: 32px;
            margin: 10px 0;
        }
        .form-item .label {
            width: 100px;
        }
        .form-item .data {
            flex: 1;
            width: 200px;
            max-width: 100%;
        }
        .form-item .input {
            height: 32px;
            width: 100%;
            box-sizing: border-box;
        }
        .form-item .button {
            margin: auto;
        }
        .form-tips {
            margin: auto;
            color: red;
            margin-bottom: 10px;
            display: none;
        }
        .db-type-switch {
            display: flex;
            gap: 10px;
            margin: 10px 0;
        }
        .db-type-switch label {
            flex: 1;
        }
        .db-type-switch label:not(.active) {
            background-color: #fff;
            color: #46bc99;
            border: 1px solid #46bc99;
            line-height: 32px;
        }
        .db-type-switch input[type="radio"] {
            display: none;
        }
        .mysql-fields {
            display: none;
        }
        .section-title {
            margin-top: 20px;
            border-bottom: 1px solid #eee;
            padding-bottom: 8px;
        }
    </style>
</head>
<body>
    <header id="header">
        <nav class="container navbar">
            <div class="navbar-header">
                <a class="logo" href="/">Melog</a>
                <div class="navbar-menu">☰</div>
            </div>
            <ul class="navbar-item">
                <li><a href="/install">系统安装</a></li>
            </ul>
        </nav>
        <div class="container jumbotron">
            <h1>{{title}}</h1>
        </div>
    </header>

    <div class="container row">
        <main class="main">
            <div class="content">
                <h2 class="section-title">数据库设置</h2>
                <form class="form" action="{{url('install')}}">
                    <input type="hidden" name="db_type" value="sqlite">
                    <div class="db-type-switch">
                        <label class="button active" data-type="sqlite"><input type="radio" name="db_type_radio" value="sqlite" checked> SQLite（默认）</label>
                        <label class="button" data-type="mysql"><input type="radio" name="db_type_radio" value="mysql"> MySQL</label>
                    </div>
                    <div class="mysql-fields">
                        <div class="form-item">
                            <div class="label">数据库主机</div><div class="data"><input class="input" type="text" name="host" value="{{mysql.host}}"></div>
                        </div>
                        <div class="form-item">
                            <div class="label">数据库用户</div><div class="data"><input class="input" type="text" name="user" value="{{mysql.user}}"></div>
                        </div>
                        <div class="form-item">
                            <div class="label">数据库密码</div><div class="data"><input class="input" type="password" name="password" value="{{mysql.password}}"></div>
                        </div>
                        <div class="form-item">
                            <div class="label">数据库名字</div><div class="data"><input class="input" type="text" name="database" value="{{mysql.database}}"></div>
                        </div>
                        <div class="form-item">
                            <div class="label">数据库端口</div><div class="data"><input class="input" type="text" name="port" value="{{mysql.port}}"></div>
                        </div>
                    </div>
                    <h2 class="section-title">管理员账号设置</h2>
                    <div class="form-item">
                        <div class="label">登录邮箱</div><div class="data"><input class="input" type="text" name="admin_email" value="melog@i-i.me" placeholder="请输入登录邮箱"></div>
                    </div>
                    <div class="form-item">
                        <div class="label">登录密码</div><div class="data"><input class="input" type="password" name="admin_password" value="" placeholder="请输入登录密码"></div>
                    </div>
                    <div class="form-item">
                        <div class="button submit">安装</div>
                    </div>
                    <div class="form-tips"></div>
                </form>
            </div>
        </main>
    </div>

    <footer id="footer">
        <div class="container">
            <p class="beian">{{description}}</p>
        </div>
        <div class="copy-right">
            <span>© 2020 <span>Powered by <a href="https://me.i-i.me/special/melog.html" target="_blank">Melog</a> · {{VERSION}} · {{new Date() - APP_TIME}}ms</span>
        </div>
    </footer>

    <div id="go-top"></div>
    <script src="https://apps.bdimg.com/libs/jquery/1.9.1/jquery.min.js"></script>
    <script src="/static/melog.js?v=0.1"></script>
    <script>
        $(function() {
            // 数据库类型切换
            $('.db-type-switch label').click(function() {
                var type = $(this).data('type');
                $('.db-type-switch label').removeClass('active');
                $(this).addClass('active');
                $(this).find('input').prop('checked', true);
                $('input[name="db_type"]').val(type);
                if(type === 'mysql') {
                    $('.mysql-fields').show();
                } else {
                    $('.mysql-fields').hide();
                }
            });

            // 安装按钮
            $('.submit').click(function() {
                var button = $(this);
                if(button.hasClass('hover')) {
                    return;
                } else {
                    button.addClass('hover').text('安装中..');
                    $('.form-tips').hide();
                }

                var $form = $(".form");
                var data = $form.serializeObject();

                $.post($form.attr("action"), data, function(re) {
                    button.removeClass('hover').text('安装');
                    if(re.state) {
                        tips(re.msg, 2000, function() {
                            location.href = '/';
                        });
                    } else {
                        tips(re.msg);
                        $('.form-tips').show().text(re.msg);
                    }
                });
            });
        })
    </script>
</body>
</html>
